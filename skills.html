<style>
/* =========================
RPG SKILL UI
========================= */

.rpg-panel {
    background: #141820;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 10px;
    margin-bottom: 10px;
}

.rpg-panel:hover .skill-icon {
    box-shadow: 0 0 10px rgba(76,201,240,0.6);
    transform: scale(1.05);
    transition: 0.2s;
}

.rpg-title {
    display: flex;
    justify-content: space-between;
    align-items: left;
    margin-bottom: 5px;
}

.rpg-title h3 {
    font-size: 30px;
    letter-spacing: 1px;
}

.level {
    font-size: 20px;
    padding: 4px 10px;
    border-radius: 10px;
    background: linear-gradient(90deg,#1e90ff,#00bcd4);
    color: white;
}

/* HPバー風 */
.rpg-bar {
    width: 100%;
    height: 14px;
    background: #0b0d10;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
}

.rpg-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#1e90ff,#00bcd4);
    box-shadow: 0 0 10px rgba(0,188,212,0.5);
    transition: 1s ease;
}

/* ホバーで光る */
.rpg-panel:hover {
    transform: translateY(-3px);
    transition: 0.2s;
    border-color: rgba(76,201,240,0.3);
}

.stats {
    font-size: 13px;
    color: #a8b0bd;
    margin-top: 6px;
}

.skill-icon {
    width: 100px;
    height: 100px;
    padding: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(76,201,240,0.3);
    border-radius: 8px;
}

.skill-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}




/* =========================
スマホ対応
========================= */
@media (max-width: 768px) {

    /* =========================
    PANEL
    ========================= */
    .rpg-panel {
        padding: 14px;
    }

    /* =========================
    タイトルレイアウト変更
    ========================= */
    .rpg-title {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    /* アイコン小さく */
    .skill-icon {
        width: 60px;
        height: 60px;
    }

    /* タイトル */
    .rpg-title h3 {
        font-size: 18px;
    }

    /* レベル表示 */
    .level {
        font-size: 14px;
        padding: 2px 8px;
    }

    /* =========================
    バー
    ========================= */
    .rpg-bar {
        height: 10px;
    }

    /* =========================
    テキスト
    ========================= */
    .stats {
        font-size: 12px;
    }

    /* =========================
    hover無効
    ========================= */
    .rpg-panel:hover {
        transform: none;
    }

    .rpg-panel:hover .skill-icon {
        transform: none;
        box-shadow: none;
    }
}

</style>
