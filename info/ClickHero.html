<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Click Hero | WORKS</title>

<link rel="stylesheet" href="../style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="../main.js" defer></script>

<style>

/* =========================
TOP
========================= */
.work-hero {
    position: relative;
    height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
}

.work-hero img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.85) contrast(1.05);
}

.work-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1),
        rgba(11,13,16,0.5)
    );
}


.hero-content {
    position: relative;
    z-index: 2;
}

.work-title {
    font-size: 48px;
    letter-spacing: 3px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

.work-sub {
    margin-top: 10px;
    color: #4cc9f0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

/* =========================
CONTAINER
========================= */
.work-container {
    max-width: 1000px;
    margin: 60px auto;
    padding: 0 20px;
}

/* =========================
CARD UI
========================= */
.work-card {
    background: linear-gradient(180deg, #141820, #10131a);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 30px;
    transition: 0.25s;
    position: relative;
    overflow: hidden;
}

.work-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(76,201,240,0.2), transparent);
    opacity: 0;
    transition: 0.3s;
}

.work-card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    border-color: rgba(76,201,240,0.5);
}

.work-card:hover::after {
    opacity: 1;
}

.work-card h3 {
    color: #4cc9f0;
    margin-bottom: 10px;
}

/* =========================
VIDEO
========================= */
.work-video video {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.work-video:hover video {
    transform: scale(1.02);
}

.work-video video {
    transition: 0.3s;
}

/* =========================
BACK BUTTON
========================= */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;

    padding: 10px 18px;
    border-radius: 30px;

    background: rgba(0,0,0,0.6);
    color: #4cc9f0;

    text-decoration: none;
    border: 1px solid rgba(76,201,240,0.3);

    transition: 0.3s;
    z-index: 1000;
}

.back-btn:hover {
    background: #4cc9f0;
    color: #000;
}

/* =========================
TAG
========================= */
.tag {
    display: inline-block;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(76,201,240,0.1);
    border: 1px solid rgba(76,201,240,0.3);
    color: #4cc9f0;
    margin-bottom: 10px;
}

</style>

</head>

<body>

<!-- 戻る -->
<a href="../works.html" class="back-btn">← BACK</a>

<!-- =========================
TOP
========================= -->
<section class="work-hero">

    <img src="../images/ClickHero.png" alt="">

    <div class="hero-content" data-fade>
        <h1 class="work-title">Click Hero</h1>
        <p class="work-sub">Only Click</p>
        <div class="tag">Unity / C#</div>
    </div>

</section>

<!-- =========================
CONTENT
========================= -->
<div class="work-container">

    <!-- 動画 -->
    <div class="work-card work-video" data-fade>
        <h3>▶ MOVIE(動画)</h3>

        <video controls autoplay loop muted>
            <source src="../videos/ClickHero.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 概要 -->
    <div class="work-card" data-fade>
        <h3>▶ OVERVIEW(概要)</h3>

        <p>
            敵をクリックして倒し、強くなる2Dクリックゲーム。
        </p>
    </div>

    <!-- 技術 -->
    <div class="work-card" data-fade>
        <h3>▶ TECH(技術)</h3>

        <p>
            Unity / C#<br>
            Ui設計 / ゲームループ / 演出設計
        </p>
    </div>

    <!-- 工夫 -->
    <div class="work-card" data-fade>
        <h3>▶ POINT(工夫)</h3>

        <p>
            ・わかりやすい演出と気持ちいい演出の実装<br>
            ・UIでのステータス強化システム<br>
            ・トロフィーコレクトによるやりこみ要素の実装
        </p>
    </div>

</div>

</body>
</html>
