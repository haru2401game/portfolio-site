<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポートフォリオ | TOP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root {
    --bg: #0f0f10;
    --panel: #161616;
    --text: #ffffff;
    --sub: rgba(255,255,255,0.7);

    --accent: #00bcd4;
    --accent2: #1e90ff;
}

body {
    margin: 0;
    font-family: "Inter", "Noto Sans JP", sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #0f0f10);
    color: white;
    font-family: "Inter", "Noto Sans JP", sans-serif;
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero-inner {
    text-align: center;
    z-index: 2;
}

.hero h1 {
    font-size: 48px;
    margin: 0;
}

.hero p {
    opacity: 0.8;
    margin-top: 10px;
}

/* 主力作品 */
.feature-work {
    margin-top: 30px;
    display: inline-block;
    text-align: left;
}

.feature-work img {
    width: 420px;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.feature-work img:hover {
    transform: scale(1.03);
}

/* ボタン */
button, .btn {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover, .btn:hover {
    opacity: 0.85;
    transform: translateY(-2px);
}

/* ===== SECTION ===== */
section {
    padding: 100px 20px;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

/* ナビ */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.nav a {
    color: white;
    text-decoration: none;
    opacity: 0.6;
    transition: 0.3s;
}

.nav a:hover {
    opacity: 1;
}

h1, h2, h3 {
    letter-spacing: 1px;
}

h2 {
    font-size: 28px;
    margin-bottom: 20px;
    position: relative;
}

h2::after {
    content: "";
    display: block;
    width: 60px;
    height: 3px;
    margin-top: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
}

</style>
</head>

<body>

<!-- ナビ -->
<div class="nav">
    <a href="works.html">WORKS</a>
    <a href="about.html">ABOUT</a>
    <a href="skills.html">SKILLS</a>
    <a href="contact.html">CONTACT</a>
</div>

<!-- HERO -->
<div class="hero">

    <div class="hero-inner">
        <h1>長屋 晴太</h1>
        <p>ゲームプログラマー志望 / Unity・C++</p>

        <!-- 主力作品 -->
        <div class="feature-work">
            <img src="images/ClickHero.png" alt="Click Hero">
            <p>Click Hero｜クリック×放置ゲーム（Unity）</p>
        </div>

        <br>
        <a class="btn" href="works.html">作品を見る</a>
    </div>

</div>

<!-- ABOUT（簡易） -->
<section>
    <div class="container">
        <h2>ABOUT</h2>
        <p>
            Unity / C++を用いたゲーム制作を行っています。<br>
            UI設計とゲームループ設計を得意としています。
        </p>
    </div>
</section>

<!-- SKILL（簡易） -->
<section>
    <div class="container">
        <h2>SKILLS</h2>
        <p>
            Unity / C# / C++ / DxLib / DirectXTK
        </p>

        <a class="btn" href="skills.html">詳しく見る</a>
    </div>
</section>

</body>
</html>
