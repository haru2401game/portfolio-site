<style>
/* =========================
RPG SKILL UI
========================= */

.rpg-panel {
    background: #141820;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 18px;
}

.rpg-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.rpg-title h3 {
    font-size: 18px;
    letter-spacing: 1px;
}

.level {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: linear-gradient(90deg,#1e90ff,#00bcd4);
    color: white;
}

/* HPバー風 */
.rpg-bar {
    width: 100%;
    height: 14px;
    background: #0b0d10;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
}

.rpg-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#1e90ff,#00bcd4);
    box-shadow: 0 0 10px rgba(0,188,212,0.5);
    transition: 1s ease;
}

/* ホバーで光る */
.rpg-panel:hover {
    transform: translateY(-3px);
    transition: 0.2s;
    border-color: rgba(76,201,240,0.5);
}

.stats {
    font-size: 13px;
    color: #a8b0bd;
    margin-top: 6px;
}
</style>

</head>
