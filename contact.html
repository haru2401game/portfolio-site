<style>

/* =========================
CONTACT GRID
========================= */
.contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
}

/* =========================
CONTACT CARD (RPG MENU)
========================= */
.contact-card {
    display: block;
    text-decoration: none;
    background: linear-gradient(180deg, #141820, #10131a);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px;
    transition: 0.25s;
    position: relative;
    overflow: hidden;
}

/* 光ライン */
.contact-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #4cc9f0, transparent);
    opacity: 0.3;
}

/* hover */
.contact-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: rgba(76,201,240,0.6);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* タイトル */
.contact-title {
    font-size: 16px;
    font-weight: bold;
    color: #4cc9f0;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

/* 説明 */
.contact-desc {
    font-size: 12px;
    color: #a8b0bd;
}

.contact-icon {
    width: 44px;
    height: 44px;
    margin-bottom: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 10px;
    background: rgba(76,201,240,0.08);
    border: 1px solid rgba(76,201,240,0.2);
}

/* 画像そのものを統一 */
.contact-icon img {
    width: 50px;
    height: 50px;

    object-fit: contain;
    display: block;
}

.contact-card:hover .contact-icon {
    box-shadow: 0 0 12px rgba(76,201,240,0.4);
    transform: scale(1.05);
    transition: 0.2s;
}

</style>

</head>
