name: Update Note Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/update-note-stats.js

      - name: Commit and Push
        run: |
          echo "NEW WORKFLOW VERSION"
          exit 1